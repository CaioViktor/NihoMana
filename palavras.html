<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treino de Palavras em Katakana</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;

      font-family:"Segoe UI",sans-serif;

      background:
        linear-gradient(135deg,#0f172a,#1e293b);

      color:white;
    }

    .app{

      width:100%;
      max-width:760px;

      background:rgba(255,255,255,0.06);

      border:1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(12px);

      border-radius:28px;

      padding:32px;

      box-shadow:
        0 25px 50px rgba(0,0,0,0.35);
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:16px;
      margin-bottom:28px;
    }

    .title{
      font-size:1.9rem;
      font-weight:700;
    }

    .stats{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .badge{

      background:rgba(255,255,255,0.08);

      padding:10px 14px;

      border-radius:14px;

      font-size:0.95rem;
    }

    .question-box{

      text-align:center;

      margin-bottom:28px;
    }

    .question-type{

      color:#94a3b8;

      text-transform:uppercase;

      letter-spacing:1px;

      font-size:0.9rem;

      margin-bottom:10px;
    }

    .question{

      font-size:4rem;

      font-weight:700;

      line-height:1.2;

      word-break:break-word;
    }

    .translation{

      margin-top:14px;

      color:#cbd5e1;

      font-size:1.05rem;
    }

    .options{

      display:grid;

      gap:14px;
    }

    .option{

      background:rgba(255,255,255,0.08);

      border:none;

      border-radius:18px;

      padding:18px;

      color:white;

      font-size:1.1rem;

      cursor:pointer;

      transition:0.2s;

      border:2px solid transparent;
    }

    .option:hover:not(:disabled){

      transform:translateY(-2px);

      background:rgba(255,255,255,0.12);

      border-color:#60a5fa;
    }

    .option:disabled{
      cursor:not-allowed;
    }

    .correct{

      background:
        rgba(34,197,94,0.25)!important;

      border-color:#22c55e!important;
    }

    .wrong{

      background:
        rgba(239,68,68,0.25)!important;

      border-color:#ef4444!important;
    }

    .feedback{

      margin-top:24px;

      min-height:40px;

      text-align:center;

      font-size:1.05rem;

      font-weight:600;
    }

    .next-btn{

      width:100%;

      margin-top:20px;

      padding:16px;

      border:none;

      border-radius:18px;

      background:
        linear-gradient(135deg,#3b82f6,#2563eb);

      color:white;

      font-size:1rem;

      font-weight:700;

      cursor:pointer;

      transition:0.2s;

      display:none;
    }

    .next-btn:hover{

      transform:translateY(-2px);

      filter:brightness(1.05);
    }

    @media(max-width:600px){

      .app{
        padding:22px;
      }

      .question{
        font-size:2.8rem;
      }

      .title{
        font-size:1.5rem;
      }

      .option{
        font-size:1rem;
      }
    }

  </style>
</head>

let currentQuestion = null;

let answered = false;

let correct = 0;

let wrong = 0;

let questionCount = 1;

const questionEl =
  document.getElementById("question");

const translationEl =
  document.getElementById("translation");

const optionsEl =
  document.getElementById("options");

const feedbackEl =
  document.getElementById("feedback");

const nextBtn =
  document.getElementById("nextBtn");

const questionTypeEl =
  document.getElementById("questionType");

const correctCountEl =
  document.getElementById("correctCount");

const wrongCountEl =
  document.getElementById("wrongCount");

const questionCountEl =
  document.getElementById("questionCount");

function shuffle(array){

  return [...array]
    .sort(()=>Math.random()-0.5);
}

function randomItem(array){

  return array[
    Math.floor(
      Math.random()*array.length
    )
  ];
}

function generateQuestion(){

  answered = false;

  optionsEl.innerHTML = "";

  feedbackEl.innerHTML = "";

  nextBtn.style.display = "none";

  /*
    TIPOS

    1 = Katakana -> Romaji
    2 = Romaji -> Katakana
    3 = Português -> Katakana
  */

  const random = Math.random();

  let type;

  // prioridade para tipo 1

  if(random < 0.55){

    type = 1;

  } else if(random < 0.85){

    type = 2;

  } else {

    type = 3;
  }

  const word = randomItem(words);

  let options = [];

  // ====================================
  // TIPO 1
  // ====================================

  if(type === 1){

    questionTypeEl.textContent =
      "Qual é a leitura desta palavra?";

    questionEl.textContent =
      word.katakana;

    translationEl.innerHTML =
      `🇧🇷 Tradução: <strong>${word.pt}</strong>`;

    options.push(word.romaji);

    while(options.length < 5){

      const candidate =
        randomItem(words).romaji;

      if(!options.includes(candidate)){

        options.push(candidate);
      }
    }

    options = shuffle(options);

    currentQuestion = {

      type,

      correct: word.romaji,

      displayCorrect: word.romaji
    };
  }

  // ====================================
  // TIPO 2
  // ====================================

  else if(type === 2){

    questionTypeEl.textContent =
      "Qual é o Katakana correto?";

    questionEl.textContent =
      word.romaji;

    translationEl.innerHTML =
      `🇧🇷 Tradução: <strong>${word.pt}</strong>`;

    options.push(word.katakana);

    while(options.length < 5){

      const candidate =
        randomItem(words).katakana;

      if(!options.includes(candidate)){

        options.push(candidate);
      }
    }

    options = shuffle(options);

    currentQuestion = {

      type,

      correct: word.katakana,

      displayCorrect: word.katakana
    };
  }

  // ====================================
  // TIPO 3
  // ====================================

  else {

    questionTypeEl.textContent =
      "Qual é o Katakana desta palavra?";

    questionEl.textContent =
      word.pt;

    translationEl.innerHTML =
      `🔤 Escrita fonética: <strong>${word.romaji}</strong>`;

    options.push(word.katakana);

    while(options.length < 5){

      const candidate =
        randomItem(words).katakana;

      if(!options.includes(candidate)){

        options.push(candidate);
      }
    }

    options = shuffle(options);

    currentQuestion = {

      type,

      correct: word.katakana,

      displayCorrect: word.katakana
    };
  }

  options.forEach(option=>{

    const btn =
      document.createElement("button");

    btn.className = "option";

    btn.textContent = option;

    btn.addEventListener("click",()=>{

      checkAnswer(btn,option);

    });

    optionsEl.appendChild(btn);

  });

}

function checkAnswer(button,selected){

  if(answered) return;

  answered = true;

  const buttons =
    document.querySelectorAll(".option");

  buttons.forEach(btn=>{

    btn.disabled = true;

  });

  if(selected === currentQuestion.correct){

    button.classList.add("correct");

    feedbackEl.innerHTML =
      "✅ Correto!";

    correct++;

    correctCountEl.textContent =
      correct;

  } else {

    button.classList.add("wrong");

    buttons.forEach(btn=>{

      if(
        btn.textContent ===
        currentQuestion.correct
      ){

        btn.classList.add("correct");
      }

    });

    feedbackEl.innerHTML =
      `❌ Errado! A resposta correta é <strong>${currentQuestion.displayCorrect}</strong>.`;

    wrong++;

    wrongCountEl.textContent =
      wrong;
  }

  nextBtn.style.display = "block";
}

nextBtn.addEventListener("click",()=>{

  questionCount++;

  questionCountEl.textContent =
    questionCount;

  generateQuestion();

});

generateQuestion();
