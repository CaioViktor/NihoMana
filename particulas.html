<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treino de Partículas Japonesas</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:20px;

      font-family:"Segoe UI",sans-serif;

      background:
        linear-gradient(135deg,#0f172a,#1e293b);

      color:white;
    }

    .app{

      width:100%;
      max-width:900px;

      background:
        rgba(255,255,255,0.06);

      border:
        1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(12px);

      border-radius:28px;

      padding:32px;

      box-shadow:
        0 25px 50px rgba(0,0,0,0.35);
    }

    .top{

      display:flex;

      justify-content:space-between;

      align-items:center;

      flex-wrap:wrap;

      gap:16px;

      margin-bottom:28px;
    }

    .title{

      font-size:1.9rem;

      font-weight:700;
    }

    .stats{

      display:flex;

      flex-wrap:wrap;

      gap:12px;
    }

    .badge{

      background:
        rgba(255,255,255,0.08);

      padding:10px 14px;

      border-radius:14px;

      font-size:0.95rem;
    }

    .question-box{

      margin-bottom:28px;

      text-align:center;
    }

    .question-type{

      color:#94a3b8;

      text-transform:uppercase;

      letter-spacing:1px;

      font-size:0.9rem;

      margin-bottom:14px;
    }

    .sentence{

      font-size:2.2rem;

      line-height:1.7;

      font-weight:700;

      margin-bottom:18px;
    }

    .translation{

      color:#cbd5e1;

      font-size:1.05rem;
    }

    .options{

      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(120px,1fr));

      gap:14px;
    }

    .option{

      background:
        rgba(255,255,255,0.08);

      border:none;

      border-radius:18px;

      padding:18px;

      color:white;

      font-size:1.4rem;

      font-weight:700;

      cursor:pointer;

      transition:0.2s;

      border:2px solid transparent;
    }

    .option:hover:not(:disabled){

      transform:translateY(-2px);

      background:
        rgba(255,255,255,0.12);

      border-color:#60a5fa;
    }

    .option:disabled{

      cursor:not-allowed;
    }

    .correct{

      background:
        rgba(34,197,94,0.25)!important;

      border-color:#22c55e!important;
    }

    .wrong{

      background:
        rgba(239,68,68,0.25)!important;

      border-color:#ef4444!important;
    }

    .feedback{

      margin-top:26px;

      min-height:80px;

      background:
        rgba(255,255,255,0.05);

      border-radius:18px;

      padding:18px;

      line-height:1.7;

      font-size:1rem;
    }

    .next-btn{

      width:100%;

      margin-top:22px;

      padding:16px;

      border:none;

      border-radius:18px;

      background:
        linear-gradient(135deg,#3b82f6,#2563eb);

      color:white;

      font-size:1rem;

      font-weight:700;

      cursor:pointer;

      transition:0.2s;

      display:none;
    }

    .next-btn:hover{

      transform:translateY(-2px);

      filter:brightness(1.05);
    }

    .particle-guide{

      margin-top:30px;

      background:
        rgba(255,255,255,0.05);

      border-radius:20px;

      padding:20px;
    }

    .particle-guide h3{

      margin-bottom:14px;
    }

    .particle-grid{

      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(140px,1fr));

      gap:12px;
    }

    .particle-card{

      background:
        rgba(255,255,255,0.05);

      padding:12px;

      border-radius:14px;
    }

    .particle-card strong{

      display:block;

      font-size:1.3rem;

      margin-bottom:6px;
    }

    @media(max-width:700px){

      .sentence{
        font-size:1.6rem;
      }

      .option{
        font-size:1.1rem;
      }

      .title{
        font-size:1.5rem;
      }

      .app{
        padding:22px;
      }
    }

</head>

<div class="app">

  <div class="top">

    <div class="title">
      Treino de Partículas Japonesas
    </div>

      </div>

        <strong>を</strong>

      </div>

      <div class="particle-card">
        <strong>に</strong>
        destino / tempo
      </div>

      <div class="particle-card">
        <strong>で</strong>
        local da ação
      </div>

      <div class="particle-card">
        <strong>と</strong>
        com / e
      </div>

      <div class="particle-card">
        <strong>も</strong>
        também
      </div>

    </div>

  </div>

</div>

let currentQuestion = null;

let answered = false;

let correct = 0;

let wrong = 0;

let questionCount = 1;

const sentenceEl =
  document.getElementById("sentence");

const translationEl =
  document.getElementById("translation");

const optionsEl =
  document.getElementById("options");

const feedbackEl =
  document.getElementById("feedback");

const nextBtn =
  document.getElementById("nextBtn");

const correctCountEl =
  document.getElementById("correctCount");

const wrongCountEl =
  document.getElementById("wrongCount");

const questionCountEl =
  document.getElementById("questionCount");

function shuffle(array){

  return [...array]
    .sort(()=>Math.random()-0.5);
}

function randomItem(array){

  return array[
    Math.floor(
      Math.random()*array.length
    )
  ];
}

function generateQuestion(){

  answered = false;

  feedbackEl.innerHTML = "";

  nextBtn.style.display = "none";

  currentQuestion =
    randomItem(questions);

  sentenceEl.textContent =
    currentQuestion.sentence;

  translationEl.innerHTML =
    `🇧🇷 ${currentQuestion.translation}`;

  optionsEl.innerHTML = "";

  const options =
    shuffle(particles);

  options.forEach(option=>{

    const btn =
      document.createElement("button");

    btn.className = "option";

    btn.textContent = option;

    btn.addEventListener("click",()=>{

      checkAnswer(btn,option);

    });

    optionsEl.appendChild(btn);

  });

}

function checkAnswer(button,selected){

  if(answered) return;

  answered = true;

  const buttons =
    document.querySelectorAll(".option");

  buttons.forEach(btn=>{

    btn.disabled = true;

  });

  if(selected === currentQuestion.correct){

    button.classList.add("correct");

    feedbackEl.innerHTML =

      `
      <div style="color:#4ade80;font-weight:700;">
        ✅ Correto!
      </div>

      <div style="margin-top:10px;">
        ${currentQuestion.explanation}
      </div>
      `;

    correct++;

    correctCountEl.textContent =
      correct;

  } else {

    button.classList.add("wrong");

    buttons.forEach(btn=>{

      if(
        btn.textContent ===
        currentQuestion.correct
      ){

        btn.classList.add("correct");
      }

    });

    feedbackEl.innerHTML =

      `
      <div style="color:#f87171;font-weight:700;">
        ❌ Errado!
      </div>

      <div style="margin-top:10px;">
        A resposta correta é:
        <strong>${currentQuestion.correct}</strong>
      </div>

      <div style="margin-top:10px;">
        ${currentQuestion.explanation}
      </div>
      `;

    wrong++;

    wrongCountEl.textContent =
      wrong;
  }

  nextBtn.style.display = "block";
}

nextBtn.addEventListener("click",()=>{

  questionCount++;

  questionCountEl.textContent =
    questionCount;

  generateQuestion();

});

generateQuestion();

</script>

</body>
</html>
